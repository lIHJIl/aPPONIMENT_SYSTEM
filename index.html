<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediCare - Clinic Appointment System</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      function showDevError(title, detail) {
        var wrapper = document.createElement('div');
        wrapper.style.cssText = 'color:red;padding:20px;font-family:monospace;background:white;position:fixed;top:0;left:0;right:0;z-index:9999;';
        var heading = document.createElement('h1');
        heading.textContent = title;
        var pre = document.createElement('pre');
        pre.textContent = String(detail);
        wrapper.appendChild(heading);
        wrapper.appendChild(pre);
        document.body.appendChild(wrapper);
      }
      window.addEventListener('error', function(event) {
        showDevError('Global Error Caught', event.error);
      });
      window.addEventListener('unhandledrejection', function(event) {
        showDevError('Unhandled Promise Rejection', event.reason);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
